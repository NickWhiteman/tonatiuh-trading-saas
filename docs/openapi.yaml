openapi: 3.1.0
info:
  title: Tonatiuh Trading SaaS API
  version: 1.0.0
  description: Multi-tenant API for accounts, subscriptions, exchange connections, and trading bots.
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
tags:
  - {name: Auth}
  - {name: Billing}
  - {name: Exchanges}
  - {name: Bots}
  - {name: Organizations}
  - {name: Platform Admin}
  - {name: Email Delivery}
  - {name: Health}
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      security: []
      requestBody: {$ref: '#/components/requestBodies/Register'}
      responses:
        '201': {description: Account created; email verification required}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody: {$ref: '#/components/requestBodies/Login'}
      responses:
        '200': {$ref: '#/components/responses/Session'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshSession
      security: []
      requestBody: {$ref: '#/components/requestBodies/RefreshToken'}
      responses:
        '200': {$ref: '#/components/responses/Session'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security: []
      requestBody: {$ref: '#/components/requestBodies/RefreshToken'}
      responses:
        '204': {description: Session revoked}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/verify-email:
    post:
      tags: [Auth]
      operationId: verifyEmail
      security: []
      requestBody: {$ref: '#/components/requestBodies/AccountToken'}
      responses:
        '200': {description: Email verified}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/resend-verification:
    post:
      tags: [Auth]
      operationId: resendVerification
      security: []
      requestBody: {$ref: '#/components/requestBodies/Email'}
      responses:
        '202': {description: Request accepted}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      security: []
      requestBody: {$ref: '#/components/requestBodies/Email'}
      responses:
        '202': {description: Request accepted}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [token, password]
              properties:
                token: {type: string}
                password: {type: string, minLength: 12, maxLength: 128, format: password}
      responses:
        '200': {description: Password replaced and sessions revoked}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/cancel-deletion:
    post:
      tags: [Auth]
      operationId: cancelAccountDeletion
      security: []
      requestBody: {$ref: '#/components/requestBodies/Login'}
      responses:
        '200': {description: Scheduled account deletion cancelled}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: currentAccount
      responses:
        '200': {description: Current account and organization}
        default: {$ref: '#/components/responses/Error'}
    delete:
      tags: [Auth]
      operationId: scheduleAccountDeletion
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: false, required: [password], properties: {password: {type: string, format: password}}}}}
      responses:
        '202': {description: Account deletion scheduled after the recovery period}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/auth/me/export:
    get:
      tags: [Auth]
      operationId: exportAccountData
      responses:
        '200': {description: Portable account data export}
        default: {$ref: '#/components/responses/Error'}

  /api/v1/billing/plans:
    get:
      tags: [Billing]
      operationId: listPlans
      security: []
      responses:
        '200': {description: Available plans}
        default: {$ref: '#/components/responses/Error'}

  /api/v1/organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      responses: {'200': {description: User workspaces and current organization}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/organizations/switch:
    post:
      tags: [Organizations]
      operationId: switchOrganization
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: false, required: [organizationId], properties: {organizationId: {type: string, format: uuid}}}}}
      responses: {'200': {$ref: '#/components/responses/Session'}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/organizations/members:
    get:
      tags: [Organizations]
      operationId: listOrganizationMembers
      responses: {'200': {description: Current organization members}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/organizations/members/{userId}:
    patch:
      tags: [Organizations]
      operationId: updateMemberRole
      parameters: [{$ref: '#/components/parameters/UserId'}]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: false, required: [role], properties: {role: {$ref: '#/components/schemas/AssignableRole'}}}}}
      responses: {'200': {description: Member role updated}, default: {$ref: '#/components/responses/Error'}}
    delete:
      tags: [Organizations]
      operationId: removeMember
      parameters: [{$ref: '#/components/parameters/UserId'}]
      responses: {'204': {description: Member removed and organization sessions revoked}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/organizations/invitations:
    get:
      tags: [Organizations]
      operationId: listInvitations
      responses: {'200': {description: Last 100 invitations}, default: {$ref: '#/components/responses/Error'}}
    post:
      tags: [Organizations]
      operationId: createInvitation
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: false, required: [email, role], properties: {email: {type: string, format: email}, role: {$ref: '#/components/schemas/AssignableRole'}}}}}
      responses: {'201': {description: Invitation queued for delivery}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/organizations/invitations/accept:
    post:
      tags: [Organizations]
      operationId: acceptInvitation
      requestBody: {$ref: '#/components/requestBodies/AccountToken'}
      responses: {'200': {description: Invitation accepted}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/organizations/invitations/{id}:
    delete:
      tags: [Organizations]
      operationId: revokeInvitation
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses: {'204': {description: Invitation revoked}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/billing/webhook:
    post:
      tags: [Billing]
      operationId: yookassaWebhook
      security: []
      requestBody:
        required: true
        content: {application/json: {schema: {type: object}}}
      responses:
        '200': {description: Notification verified and processed}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/billing/subscription:
    get:
      tags: [Billing]
      operationId: getSubscription
      responses:
        '200': {description: Organization subscription}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/billing/usage:
    get:
      tags: [Billing]
      operationId: getPlanUsage
      responses:
        '200': {description: "Effective plan, entitlements and current organization usage"}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/billing/checkout:
    post:
      tags: [Billing]
      operationId: createCheckout
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}]
      responses:
        '201': {description: YooKassa redirect payment created}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/billing/cancel:
    post:
      tags: [Billing]
      operationId: cancelSubscription
      responses:
        '200': {description: Renewal disabled}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/billing/resume:
    post:
      tags: [Billing]
      operationId: resumeSubscription
      responses:
        '200': {description: Renewal enabled}
        default: {$ref: '#/components/responses/Error'}

  /api/v1/exchanges:
    get:
      tags: [Exchanges]
      operationId: listExchangeConnections
      responses:
        '200': {description: Connections without credentials}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Exchanges]
      operationId: createExchangeConnection
      requestBody: {$ref: '#/components/requestBodies/ExchangeConnection'}
      responses:
        '201': {description: Encrypted connection created}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/exchanges/{id}:
    patch:
      tags: [Exchanges]
      operationId: updateExchangeConnection
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      requestBody: {$ref: '#/components/requestBodies/ExchangeConnectionPatch'}
      responses:
        '200': {description: Connection updated}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/exchanges/{id}/verify:
    post:
      tags: [Exchanges]
      operationId: verifyExchangeConnection
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses:
        '200': {description: Credentials verified through the exchange API}
        default: {$ref: '#/components/responses/Error'}

  /api/v1/bots:
    get:
      tags: [Bots]
      operationId: listBots
      responses:
        '200': {description: Organization bots}
        default: {$ref: '#/components/responses/Error'}
    post:
      tags: [Bots]
      operationId: createBot
      requestBody: {$ref: '#/components/requestBodies/Bot'}
      responses:
        '201': {description: Bot created}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/bots/{id}:
    get:
      tags: [Bots]
      operationId: getBot
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses:
        '200': {description: Bot details}
        default: {$ref: '#/components/responses/Error'}
    patch:
      tags: [Bots]
      operationId: updateBot
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      requestBody: {$ref: '#/components/requestBodies/BotPatch'}
      responses:
        '200': {description: Stopped bot updated}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/bots/{id}/start:
    post:
      tags: [Bots]
      operationId: startBot
      parameters: [{$ref: '#/components/parameters/ResourceId'}, {$ref: '#/components/parameters/IdempotencyKey'}]
      responses: {'202': {description: Command accepted}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/bots/{id}/stop:
    post:
      tags: [Bots]
      operationId: stopBot
      parameters: [{$ref: '#/components/parameters/ResourceId'}, {$ref: '#/components/parameters/IdempotencyKey'}]
      responses: {'202': {description: Command accepted}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/bots/{id}/restart:
    post:
      tags: [Bots]
      operationId: restartBot
      parameters: [{$ref: '#/components/parameters/ResourceId'}, {$ref: '#/components/parameters/IdempotencyKey'}]
      responses: {'202': {description: Command accepted}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/bots/{id}/commands:
    get:
      tags: [Bots]
      operationId: listBotCommands
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses:
        '200': {description: Last 100 commands}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/bots/{id}/orders:
    get:
      tags: [Bots]
      operationId: listBotOrders
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses:
        '200': {description: Last 200 orders}
        default: {$ref: '#/components/responses/Error'}

  /api/v1/email/provider-events:
    post:
      tags: [Email Delivery]
      operationId: emailProviderEvent
      security: [{emailWebhookToken: []}]
      requestBody:
        required: true
        content: {application/json: {schema: {type: object, additionalProperties: false, required: [eventId, messageId, type], properties: {eventId: {type: string, maxLength: 200}, messageId: {type: string, maxLength: 500}, type: {type: string, enum: [DELIVERED, HARD_BOUNCE, COMPLAINT]}}}}}
      responses: {'202': {description: Provider event accepted idempotently}, default: {$ref: '#/components/responses/Error'}}

  /health/live:
    get:
      tags: [Health]
      operationId: liveness
      security: []
      responses: {'200': {description: Process is alive}}
  /api/v1/admin/stats:
    get:
      tags: [Platform Admin]
      operationId: adminStats
      responses: {'200': {description: Platform counters}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/users:
    get:
      tags: [Platform Admin]
      operationId: adminListUsers
      parameters: [{$ref: '#/components/parameters/Limit'}, {$ref: '#/components/parameters/Offset'}, {$ref: '#/components/parameters/Search'}]
      responses: {'200': {description: Users without credentials}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/users/{id}/status:
    patch:
      tags: [Platform Admin]
      operationId: adminChangeUserStatus
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      requestBody: {$ref: '#/components/requestBodies/PlatformStatus'}
      responses: {'200': {description: User status changed}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/users/{id}/revoke-sessions:
    post:
      tags: [Platform Admin]
      operationId: adminRevokeUserSessions
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses: {'200': {description: Refresh sessions revoked}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/organizations:
    get:
      tags: [Platform Admin]
      operationId: adminListOrganizations
      parameters: [{$ref: '#/components/parameters/Limit'}, {$ref: '#/components/parameters/Offset'}, {$ref: '#/components/parameters/Search'}]
      responses: {'200': {description: Organizations and aggregate counts}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/organizations/{id}/status:
    patch:
      tags: [Platform Admin]
      operationId: adminChangeOrganizationStatus
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      requestBody: {$ref: '#/components/requestBodies/PlatformStatus'}
      responses: {'200': {description: Organization status changed}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/audit-events:
    get:
      tags: [Platform Admin]
      operationId: adminListAuditEvents
      parameters: [{$ref: '#/components/parameters/Limit'}, {$ref: '#/components/parameters/Offset'}]
      responses: {'200': {description: Platform audit events}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/payments:
    get:
      tags: [Platform Admin]
      operationId: adminListPayments
      parameters: [{$ref: '#/components/parameters/Limit'}, {$ref: '#/components/parameters/Offset'}]
      responses: {'200': {description: Sanitized payment records}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/system:
    get:
      tags: [Platform Admin]
      operationId: adminSystemStatus
      responses: {'200': {description: Worker and queue aggregates}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/email/dead-letters:
    get:
      tags: [Platform Admin]
      operationId: adminListEmailDeadLetters
      parameters: [{$ref: '#/components/parameters/Limit'}, {$ref: '#/components/parameters/Offset'}]
      responses: {'200': {description: Dead letters with masked recipients}, default: {$ref: '#/components/responses/Error'}}
  /api/v1/admin/email/dead-letters/{id}/retry:
    post:
      tags: [Platform Admin]
      operationId: adminRetryEmailDeadLetter
      parameters: [{$ref: '#/components/parameters/ResourceId'}]
      responses: {'202': {description: Dead letter queued for retry}, default: {$ref: '#/components/responses/Error'}}
  /health/ready:
    get:
      tags: [Health]
      operationId: readiness
      security: []
      responses:
        '200': {description: API and PostgreSQL are ready}
        '503': {description: Service is not ready}
  /metrics:
    get:
      tags: [Health]
      operationId: prometheusMetrics
      security: [{metricsToken: []}]
      responses:
        '200': {description: Prometheus text exposition format}
        '401': {description: Metrics token is invalid}
        '503': {description: Metrics endpoint is not configured}

components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
    metricsToken: {type: http, scheme: bearer, bearerFormat: opaque metrics token}
    emailWebhookToken: {type: http, scheme: bearer, bearerFormat: opaque provider webhook token}
  parameters:
    ResourceId: {name: id, in: path, required: true, schema: {type: string, format: uuid}}
    UserId: {name: userId, in: path, required: true, schema: {type: string, format: uuid}}
    IdempotencyKey: {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 8, maxLength: 128}}
    Limit: {name: limit, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 50}}
    Offset: {name: offset, in: query, schema: {type: integer, minimum: 0, default: 0}}
    Search: {name: search, in: query, schema: {type: string, maxLength: 320}}
  responses:
    Error:
      description: Standard API error
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}
    Session:
      description: Access and rotating refresh tokens
      content: {application/json: {schema: {$ref: '#/components/schemas/Session'}}}
  requestBodies:
    Register:
      required: true
      content: {application/json: {schema: {$ref: '#/components/schemas/Register'}}}
    Login:
      required: true
      content: {application/json: {schema: {$ref: '#/components/schemas/Login'}}}
    RefreshToken:
      required: true
      content: {application/json: {schema: {type: object, additionalProperties: false, required: [refreshToken], properties: {refreshToken: {type: string}}}}}
    AccountToken:
      required: true
      content: {application/json: {schema: {type: object, additionalProperties: false, required: [token], properties: {token: {type: string}}}}}
    Email:
      required: true
      content: {application/json: {schema: {type: object, additionalProperties: false, required: [email], properties: {email: {type: string, format: email, maxLength: 320}}}}}
    ExchangeConnection:
      required: true
      content: {application/json: {schema: {$ref: '#/components/schemas/ExchangeConnectionInput'}}}
    ExchangeConnectionPatch:
      required: true
      content: {application/json: {schema: {type: object, additionalProperties: false, properties: {label: {type: string}, enabled: {type: boolean}, apiKey: {type: string, writeOnly: true}, secret: {type: string, writeOnly: true}, password: {type: string, writeOnly: true}}}}}
    Bot:
      required: true
      content: {application/json: {schema: {$ref: '#/components/schemas/BotInput'}}}
    BotPatch:
      required: true
      content: {application/json: {schema: {type: object, additionalProperties: false, properties: {name: {type: string}, configuration: {$ref: '#/components/schemas/TradingConfiguration'}}}}}
    PlatformStatus:
      required: true
      content: {application/json: {schema: {type: object,additionalProperties: false,required: [status],properties: {status: {type: string,enum: [ACTIVE,SUSPENDED]}}}}}
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties: {code: {type: string}, message: {type: string}, requestId: {type: string}, details: {}}
    Session:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties: {accessToken: {type: string, writeOnly: true}, refreshToken: {type: string, writeOnly: true}, expiresIn: {type: integer}}
    AssignableRole: {type: string, enum: [ADMIN, TRADER, ANALYST, BILLING, VIEWER]}
    Register:
      type: object
      additionalProperties: false
      required: [email, password, displayName, acceptTerms, acceptPrivacy]
      properties: {email: {type: string, format: email, maxLength: 320}, password: {type: string, format: password, minLength: 12, maxLength: 128}, displayName: {type: string, minLength: 2, maxLength: 120}, organizationName: {type: string, maxLength: 120}, acceptTerms: {type: boolean}, acceptPrivacy: {type: boolean}}
    Login:
      type: object
      additionalProperties: false
      required: [email, password]
      properties: {email: {type: string, format: email}, password: {type: string, format: password}}
    ExchangeConnectionInput:
      type: object
      additionalProperties: false
      required: [exchange, label, apiKey, secret]
      properties: {exchange: {type: string, enum: [okx, binance, bitget, kucoin, mexc, poloniex, gate, exmo, bybit]}, label: {type: string}, apiKey: {type: string, writeOnly: true}, secret: {type: string, writeOnly: true}, password: {type: string, writeOnly: true}, sandbox: {type: boolean}, verify: {type: boolean}}
    BotInput:
      type: object
      additionalProperties: false
      required: [exchangeConnectionId, name, configuration]
      properties: {exchangeConnectionId: {type: string, format: uuid}, name: {type: string}, strategy: {type: string, enum: [VECTOR_PROFIT]}, configuration: {$ref: '#/components/schemas/TradingConfiguration'}}
    TradingConfiguration:
      type: object
      additionalProperties: false
      required: [symbol]
      properties:
        symbol: {type: string, pattern: '^[A-Z0-9]{2,12}/[A-Z0-9]{2,12}$'}
        positionSize: {type: number, exclusiveMinimum: 0}
        countGridSize: {type: number, minimum: 1, maximum: 100}
        gridSize: {type: number, exclusiveMinimum: 0}
        percentBuyBackStep: {type: number, minimum: 0, maximum: 1}
        takeProfit: {type: number, minimum: 0, maximum: 1}
        stopLoss: {type: number, minimum: 0, maximum: 1}
        percentProfit: {type: number, minimum: 0, maximum: 1}
        percentFromBalance: {type: number, exclusiveMinimum: 0, maximum: 1}
        candlePriceRange: {type: string, enum: [1m, 5m, 15m, 1h, 4h, 1d]}
        isFibonacci: {type: boolean}
        isPercentTargetAfterTakeProfit: {type: boolean}
        isCapitalizeDeltaFromSale: {type: boolean}
        isCoinAccumulation: {type: boolean}
        isOnlyBuy: {type: boolean}
        percentTargetAfterTakeProfit: {type: number, minimum: 0, maximum: 1}
        balanceDistribution: {type: boolean}
