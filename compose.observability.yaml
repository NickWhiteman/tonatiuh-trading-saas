services:
  prometheus:
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml","--storage.tsdb.retention.time=30d","--web.enable-lifecycle"]
    volumes: [./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,./ops/prometheus/rules:/etc/prometheus/rules:ro,prometheus-data:/prometheus]
    secrets: [metrics_token]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [backend]
    restart: unless-stopped
    depends_on: [api,alertmanager]

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command: ["--config.file=/etc/alertmanager/alertmanager.yml","--storage.path=/alertmanager"]
    volumes: [./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro,alertmanager-data:/alertmanager]
    secrets: [alert_webhook_url]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [backend,egress]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes: [./ops/grafana/provisioning:/etc/grafana/provisioning:ro,./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro,grafana-data:/var/lib/grafana]
    secrets: [grafana_admin_password]
    ports: ["127.0.0.1:3000:3000"]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [backend]
    restart: unless-stopped
    depends_on: [prometheus]

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
secrets:
  alert_webhook_url: {external: true}
  grafana_admin_password: {external: true}
