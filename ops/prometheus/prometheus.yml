global:
  scrape_interval: 30s
  evaluation_interval: 30s
rule_files: [/etc/prometheus/rules/*.yml]
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]
scrape_configs:
  - job_name: tonatiuh-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: [api:3131]
